services:
  algo-wallet-backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: algo-wallet-backend
    restart: always
    ports:
      - "4000:4000"
    # OPTION 1: Point directly to the .env file on your VPS
    env_file:
      - .env
    environment:
      - PORT=4000
      # Overriding PAWN and VAULT to use internal Docker DNS for co-hosting
      - PAWN_URL=http://pawn:3000
      - VAULT_URL=http://vault:8200
      # Re-declaring these ensures they are correctly passed even if env_file has issues
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - VAULT_ROLE_ID=${VAULT_ROLE_ID}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID}
    networks:
      - intermezzo-network

networks:
  intermezzo-network:
    external: true
    name: intermezzo_default # This must match the network of your vault/pawn containers
